<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HanoiBox â Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0f1117;--card:#16181f;--border:#2a2d3a;
    --red:#e8453c;--text:#f0f0f0;--sub:#7a7f99;
    --green:#22c55e;--yellow:#f59e0b;--blue:#3b82f6;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;}
  .sidebar{width:200px;background:var(--card);border-right:1px solid var(--border);
    display:flex;flex-direction:column;padding:20px 0;flex-shrink:0;position:fixed;height:100vh;}
  .logo{padding:0 20px 24px;font-size:15px;font-weight:800;letter-spacing:.04em;color:var(--red);}
  .logo span{color:var(--text);}
  .nav-item{padding:10px 20px;font-size:12.5px;color:var(--sub);cursor:pointer;
    display:flex;align-items:center;gap:10px;border-left:3px solid transparent;transition:all .15s;}
  .nav-item.active{color:var(--text);background:#1e2130;border-left-color:var(--red);}
  .nav-item:hover:not(.active){color:#c0c4d8;background:#1a1c26;}
  .main{flex:1;margin-left:200px;display:flex;flex-direction:column;}
  .topbar{background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px;
    display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .topbar-title{font-size:14px;font-weight:700;}
  .topbar-sub{font-size:11px;color:var(--sub);margin-top:2px;}
  .badge{background:#e8453c22;color:var(--red);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;}
  .refresh-btn{background:none;border:1px solid var(--border);color:var(--sub);
    border-radius:6px;padding:5px 12px;cursor:pointer;font-size:11px;transition:all .15s;}
  .refresh-btn:hover{color:var(--text);border-color:var(--sub);}
  .content{padding:20px 24px;flex:1;}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;}
  .stat-label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
  .stat-value{font-size:22px;font-weight:800;}
  .stat-change{font-size:10.5px;margin-top:4px;color:var(--sub);}
  .grid2{display:grid;grid-template-columns:1fr 320px;gap:12px;}
  .right-col{display:flex;flex-direction:column;gap:12px;}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .panel-header{padding:14px 16px;border-bottom:1px solid var(--border);
    font-size:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
  .panel-action{font-size:11px;color:var(--red);cursor:pointer;font-weight:500;background:none;border:none;}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:10px;color:var(--sub);text-transform:uppercase;
    letter-spacing:.06em;padding:10px 16px;border-bottom:1px solid var(--border);font-weight:600;}
  td{padding:11px 16px;font-size:12px;border-bottom:1px solid #1e2130;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:#1a1c26;}
  .pill{display:inline-block;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:600;}
  .pill-green{background:#22c55e22;color:var(--green);}
  .pill-red{background:#e8453c22;color:var(--red);}
  .pill-yellow{background:#f59e0b22;color:var(--yellow);}
  .pill-blue{background:#3b82f622;color:var(--blue);}
  .chart-area{padding:16px;}
  .alert-item{padding:12px 16px;border-bottom:1px solid #1e2130;font-size:12px;}
  .alert-item:last-child{border-bottom:none;}
  .alert-name{font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:6px;}
  .alert-sub{font-size:10.5px;color:var(--sub);}
  .tg-item{padding:10px 16px;border-bottom:1px solid #1e2130;font-size:11.5px;}
  .tg-item:last-child{border-bottom:none;}
  .tg-sender{color:var(--blue);font-weight:600;}
  .tg-time{font-size:10px;color:var(--sub);margin-top:2px;}
  .loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--sub);font-size:13px;}
  .empty{padding:24px 16px;text-align:center;color:var(--sub);font-size:12px;}
</style>
</head>
<body>
<script>
  const API_URL = localStorage.getItem('hanoibox_api') || 'https://web-production-905d2.up.railway.app';
